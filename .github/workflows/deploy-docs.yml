name: Deploy Docs

on:
  push:
    branches: [master]
    paths: ['website/**', 'sample/**', 'pinch-grid/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build docs site
        working-directory: website
        run: npm ci && npm run build

      - name: Copy demo video into docs
        run: |
          mkdir -p website/dist/demo
          cp assets/demo.gif website/dist/demo/ 2>/dev/null || true
          cp assets/demo.mp4 website/dist/demo/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
