name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Clean staging directory
        run: rm -rf pinch-grid/build/staging-deploy

      - name: Build signed staging bundle
        run: |
          ./gradlew :pinch-grid:publishAllPublicationsToLocalStagingRepository \
            -Psigning.gnupg.keyName=${{ secrets.GPG_KEY_ID }}

      - name: Create bundle zip for Central Portal
        run: |
          cd pinch-grid/build/staging-deploy
          zip -r ../../../maven-central-bundle.zip .

      - name: Create GitHub Release with bundle
        uses: softprops/action-gh-release@v2
        with:
          files: maven-central-bundle.zip
          generate_release_notes: true
