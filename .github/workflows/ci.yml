name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build library
        run: ./gradlew :pinch-grid:build

      - name: Run tests
        run: ./gradlew :pinch-grid:allTests

      - name: API compatibility check
        run: ./gradlew :pinch-grid:apiCheck

      - name: Build sample (Android)
        run: ./gradlew :sample:assembleDebug
